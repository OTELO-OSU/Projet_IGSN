# Production stack for the preprod EC2 host: runs the pre-built igsn-*:preprod
# images shipped by infra/preprod/scripts/deploy.sh via `docker save | ssh docker load`.
# Postgres runs here as a container with a persistent volume; its password comes
# from the host docker-compose.env that the operator copies to the host.
#
# Not meant to `up` locally: it needs the loaded igsn-*:preprod images and DNS
# for $DOMAIN.
#
# Only Caddy publishes ports (80/443); the apps and Postgres are reachable only
# over the compose network, per the service-exposure rule.

# Shared HTTP healthcheck: every app listens on :8080 and returns 2xx on /.
x-healthcheck: &healthcheck
  test: ["CMD", "curl", "-fsS", "http://localhost:8080/"]
  interval: 10s
  timeout: 5s
  retries: 5
  start_period: 20s

services:
  postgres:
    # Alpine variant, unlike dev's Debian one: the existing pgdata volume was
    # initialized under musl, and moving to glibc would change collation and
    # corrupt text index ordering.
    image: postgis/postgis:17-3.5-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${DATABASE_USER}
      POSTGRES_PASSWORD: ${DATABASE_PASSWORD}
      POSTGRES_DB: ${DATABASE_NAME}
    healthcheck:
      # -h localhost forces a TCP check: the postgis image runs its init behind a
      # socket-only server, so a socket pg_isready reports ready while TCP 5432 is
      # still refused.
      test:
        [
          "CMD-SHELL",
          "pg_isready -U ${DATABASE_USER} -d ${DATABASE_NAME} -h localhost",
        ]
      interval: 5s
      timeout: 3s
      retries: 15
    volumes:
      - pgdata:/var/lib/postgresql/data

  # One-off: apply migrations, then exit. The api waits for success.
  migrate:
    image: igsn-api:preprod
    command: ["node", "scripts/migrate.ts"]
    environment:
      DATABASE_HOST: postgres
      DATABASE_PORT: "5432"
      DATABASE_NAME: ${DATABASE_NAME}
      DATABASE_USER: ${DATABASE_USER}
      DATABASE_PASSWORD: ${DATABASE_PASSWORD}
    restart: "no"
    depends_on:
      postgres:
        condition: service_healthy

  api:
    image: igsn-api:preprod
    restart: unless-stopped
    environment:
      PORT: "8080"
      CORS_ORIGINS: "https://igsn-admin.${DOMAIN},https://igsn.${DOMAIN}"
      DATABASE_HOST: postgres
      DATABASE_PORT: "5432"
      DATABASE_NAME: ${DATABASE_NAME}
      DATABASE_USER: ${DATABASE_USER}
      DATABASE_PASSWORD: ${DATABASE_PASSWORD}
      # Issuer is the browser-facing Keycloak URL (baked into tokens); JWKS is
      # fetched over the compose network from the keycloak service directly.
      OIDC_ISSUER: "https://igsn-auth.${DOMAIN}/realms/igsn"
      OIDC_JWKS_URI: "http://keycloak:8080/realms/igsn/protocol/openid-connect/certs"
      # Uploaded sample attachments (ADR 0017); a named volume so blobs
      # survive image redeploys. A Ceph mount will take over this path.
      ATTACHMENTS_DIR: /data/attachments
    healthcheck: *healthcheck
    volumes:
      - attachments:/data/attachments
    depends_on:
      migrate:
        condition: service_completed_successfully

  # Same throwaway Keycloak as dev (start-dev, realm imported from keycloak/*.json)
  # plus the mock SAML IdP, so preprod exercises the real broker flow without
  # wiring true RENATER. KC_HOSTNAME + proxy headers make Keycloak emit its public
  # https URLs behind Caddy. See docs/adr/0003-preprod-auth-stack.md.
  # ponytail: H2 in-memory, so brokered users vanish on container recreate and
  # re-provision on next login. Switch to `start` + Postgres if durable state matters.
  keycloak:
    image: quay.io/keycloak/keycloak:26.6
    restart: unless-stopped
    command: start-dev --import-realm
    environment:
      KC_BOOTSTRAP_ADMIN_USERNAME: admin
      KC_BOOTSTRAP_ADMIN_PASSWORD: ${KEYCLOAK_PASSWORD}
      # Also exposed bare so the realm import substitutes it into the mock-orcid
      # user's password (${KEYCLOAK_PASSWORD} in mock-orcid-realm.json).
      KEYCLOAK_PASSWORD: ${KEYCLOAK_PASSWORD}
      KC_HEALTH_ENABLED: "true"
      KC_HOSTNAME: "https://igsn-auth.${DOMAIN}"
      KC_PROXY_HEADERS: xforwarded
      # URLs the realm import substitutes for the public preprod hosts.
      ADMIN_REDIRECT_URI: "https://igsn-admin.${DOMAIN}/*"
      ADMIN_WEB_ORIGIN: "https://igsn-admin.${DOMAIN}"
      SHIBBOLETH_SSO_URL: "https://igsn-idp.${DOMAIN}/simplesaml/saml2/idp/SSOService.php"
      SHIBBOLETH_SLO_URL: "https://igsn-idp.${DOMAIN}/simplesaml/saml2/idp/SingleLogoutService.php"
      ORCID_LOGOUT_URL: "https://igsn-auth.${DOMAIN}/realms/mock-orcid/protocol/openid-connect/logout"
      # ORCID brokers to the mock-orcid realm in this same Keycloak. Browser-facing
      # URLs (authorization, broker redirect, issuer) are public; backend calls
      # keycloak reaches over localhost, the same public/internal split as the api.
      ORCID_BROKER_REDIRECT_URI: "https://igsn-auth.${DOMAIN}/realms/igsn/broker/orcid/endpoint"
      ORCID_AUTHORIZATION_URL: "https://igsn-auth.${DOMAIN}/realms/mock-orcid/protocol/openid-connect/auth"
      ORCID_TOKEN_URL: "http://localhost:8080/realms/mock-orcid/protocol/openid-connect/token"
      ORCID_USERINFO_URL: "http://localhost:8080/realms/mock-orcid/protocol/openid-connect/userinfo"
      ORCID_ISSUER: "https://igsn-auth.${DOMAIN}/realms/mock-orcid"
      ORCID_JWKS_URL: "http://localhost:8080/realms/mock-orcid/protocol/openid-connect/certs"
    volumes:
      - ./keycloak:/opt/keycloak/data/import:ro

  saml-idp:
    image: kenchan0130/simplesamlphp
    restart: unless-stopped
    environment:
      SIMPLESAMLPHP_SP_ENTITY_ID: "https://igsn-auth.${DOMAIN}/realms/igsn"
      SIMPLESAMLPHP_SP_ASSERTION_CONSUMER_SERVICE: "https://igsn-auth.${DOMAIN}/realms/igsn/broker/shibboleth/endpoint"
      SIMPLESAMLPHP_SP_SINGLE_LOGOUT_SERVICE: "https://igsn-auth.${DOMAIN}/realms/igsn/broker/shibboleth/endpoint"
      SIMPLESAMLPHP_IDP_BASE_URL: "https://igsn-idp.${DOMAIN}/simplesaml/"
      # Shared with the Keycloak admin password; read by authsources.php.
      KEYCLOAK_PASSWORD: ${KEYCLOAK_PASSWORD}
    volumes:
      - ./saml-idp/authsources.php:/var/www/simplesamlphp/config/authsources.php:ro
      - ./saml-idp/apache-hardening.conf:/etc/apache2/conf-enabled/zzz-hardening.conf:ro

  admin:
    image: igsn-admin:preprod
    restart: unless-stopped
    healthcheck: *healthcheck

  frontend:
    image: igsn-frontend:preprod
    restart: unless-stopped
    environment:
      PORT: "8080"
      API_URL: "https://igsn-api.${DOMAIN}"
    healthcheck: *healthcheck

  # Edge: terminates TLS with the Cloudflare Origin CA cert (mounted from the
  # host ~/certs), reverse-proxies to the apps, and sets the required security
  # headers for every response.
  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    environment:
      DOMAIN: ${DOMAIN}
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      # Cloudflare Origin CA cert + key the operator copies to the host ~/certs.
      - ./certs:/certs:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      api:
        condition: service_healthy
      admin:
        condition: service_healthy
      frontend:
        condition: service_healthy
      # No in-container curl, so no healthcheck: just order the start. Caddy
      # retries the upstream until Keycloak/the IdP answer.
      keycloak:
        condition: service_started
      saml-idp:
        condition: service_started

volumes:
  pgdata:
  attachments:
  caddy_data:
  caddy_config:
