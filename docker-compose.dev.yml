services:
  postgres:
    image: postgres:17-alpine
    container_name: postgres
    environment:
      POSTGRES_USER: igsn
      POSTGRES_PASSWORD: igsn
      POSTGRES_DB: igsn
    # No HTTP endpoint, so this one keeps pg_isready rather than curl.
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U igsn -d igsn"]
      interval: 2s
      timeout: 3s
      retries: 15
    volumes:
      - pgdata:/var/lib/postgresql/data
  keycloak:
    image: quay.io/keycloak/keycloak:26.6
    container_name: keycloak
    command: start-dev --import-realm
    environment:
      KC_BOOTSTRAP_ADMIN_USERNAME: admin
      KC_BOOTSTRAP_ADMIN_PASSWORD: admin
      KC_HEALTH_ENABLED: "true"
    # The "orcid" broker defaults to the local mock-orcid realm, so dev needs no
    # credentials. To point it at real ORCID instead, set the ORCID_* vars in
    # .env (see .env.example); anything unset falls back to the mock.
    env_file:
      - path: .env
        required: false
    ports:
      - "8080:8080"
    volumes:
      - ./keycloak:/opt/keycloak/data/import:ro

  # Fake Shibboleth (SAML) IdP for local dev/test. In prod this is replaced by
  # the real RENATER/eduGAIN IdP — only the metadata/SSO URL changes.
  saml-idp:
    image: kenchan0130/simplesamlphp
    container_name: saml-idp
    ports:
      - "8081:8080"
    environment:
      SIMPLESAMLPHP_SP_ENTITY_ID: http://localhost:8080/realms/igsn
      SIMPLESAMLPHP_SP_ASSERTION_CONSUMER_SERVICE: http://localhost:8080/realms/igsn/broker/shibboleth/endpoint
      SIMPLESAMLPHP_IDP_BASE_URL: http://localhost:8081/simplesaml/
    volumes:
      - ./saml-idp/authsources.php:/var/www/simplesamlphp/config/authsources.php:ro

  frontend:
    build:
      context: .
      dockerfile: ./packages/frontend/Dockerfile
      target: dev
    container_name: frontend
    ports:
      - "3000:3000"
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:3000/"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 40s
    develop:
      watch:
        - action: sync
          path: ./packages/frontend
          target: /app/packages/frontend
          ignore:
            - node_modules/
        - action: sync
          path: ./packages/domain
          target: /app/packages/domain
          ignore:
            - node_modules/
        - action: sync
          path: ./packages/design-system
          target: /app/packages/design-system
          ignore:
            - node_modules/
        - action: sync+restart
          path: ./tsconfig.base.json
          target: /app/tsconfig.base.json
        - action: rebuild
          path: ./pnpm-lock.yaml

  admin:
    build:
      context: .
      dockerfile: ./packages/admin/Dockerfile
      target: dev
    container_name: admin
    ports:
      - "3001:3001"
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:3001/"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 40s
    develop:
      watch:
        - action: sync
          path: ./packages/admin
          target: /app/packages/admin
          ignore:
            - node_modules/
        - action: sync
          path: ./packages/domain
          target: /app/packages/domain
          ignore:
            - node_modules/
        - action: sync
          path: ./packages/design-system
          target: /app/packages/design-system
          ignore:
            - node_modules/
        - action: sync+restart
          path: ./tsconfig.base.json
          target: /app/tsconfig.base.json
        - action: rebuild
          path: ./pnpm-lock.yaml

  api:
    build:
      context: .
      dockerfile: ./packages/api/Dockerfile
      target: dev
    container_name: api
    environment:
      # Token issuer is the browser-facing Keycloak URL; the api fetches JWKS on
      # its own network, so the fetch URL points at the keycloak service directly.
      OIDC_ISSUER: http://localhost:8080/realms/igsn
      OIDC_JWKS_URI: http://keycloak:8080/realms/igsn/protocol/openid-connect/certs
      ADMIN_ORIGIN: http://localhost:3001
    ports:
      - "3002:3002"
    environment:
      CORS_ORIGINS: "http://localhost:3001"
      DATABASE_HOST: postgres
      DATABASE_PORT: "5432"
      DATABASE_NAME: igsn
      DATABASE_USER: igsn
      DATABASE_PASSWORD: igsn
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:3002/"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 40s
    depends_on:
      postgres:
        condition: service_healthy
    develop:
      watch:
        - action: sync
          path: ./packages/api
          target: /app/packages/api
          ignore:
            - node_modules/
        - action: sync
          path: ./packages/domain
          target: /app/packages/domain
          ignore:
            - node_modules/
        - action: sync+restart
          path: ./tsconfig.base.json
          target: /app/tsconfig.base.json
        - action: rebuild
          path: ./pnpm-lock.yaml

volumes:
  pgdata:
