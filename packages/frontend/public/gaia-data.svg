<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 330 330" role="img" aria-label="Gaia Data">
  <defs>
    <style>
      .green { fill: #1f9d57; }
      .navy { fill: #1f3a5f; }
    </style>
  </defs>

  <!-- outer rings -->
  <circle cx="165" cy="163" r="150" fill="none" stroke="#3cb44b" stroke-width="3"/>
  <circle cx="168" cy="167" r="150" fill="none" stroke="#1f3a5f" stroke-width="2.5"/>

  <!-- constellation lines -->
  <g stroke="#1f3a5f" stroke-width="1.5" opacity="0.7">
    <line x1="60" y1="120" x2="150" y2="60"/>
    <line x1="60" y1="120" x2="20" y2="165"/>
    <line x1="20" y1="165" x2="120" y2="300"/>
    <line x1="120" y1="300" x2="300" y2="190"/>
    <line x1="300" y1="190" x2="310" y2="163"/>
    <line x1="150" y1="60" x2="240" y2="50"/>
  </g>

  <!-- pixel scatter (left) -->
  <g class="navy">
    <rect x="48" y="96" width="7" height="7"/>
    <rect x="60" y="104" width="6" height="6"/>
    <rect x="42" y="112" width="6" height="6"/>
    <rect x="56" y="120" width="8" height="8"/>
    <rect x="70" y="116" width="5" height="5"/>
    <rect x="50" y="132" width="6" height="6"/>
    <rect x="64" y="138" width="7" height="7"/>
    <rect x="40" y="146" width="5" height="5"/>
  </g>
  <g fill="#2aa7c0">
    <rect x="78" y="108" width="6" height="6"/>
    <rect x="84" y="126" width="5" height="5"/>
    <rect x="74" y="134" width="6" height="6"/>
    <rect x="90" y="116" width="4" height="4"/>
  </g>

  <!-- nodes on the circle -->
  <polygon points="20,153 28,148 36,153 36,163 28,168 20,163" fill="#e8852a"/>
  <polygon points="150,52 158,47 166,52 166,62 158,67 150,62" fill="#1f3a5f"/>
  <circle cx="310" cy="163" r="6.5" fill="#2f6fb0"/>
  <circle cx="300" cy="190" r="8" fill="#1f9d57"/>
  <circle cx="120" cy="300" r="7" fill="#2aa7c0"/>

  <!-- wordmark -->
  <text x="120" y="150" text-anchor="middle" font-family="Georgia, 'Times New Roman', serif" font-weight="700" font-size="92" class="green">GAIA</text>
  <text x="150" y="232" text-anchor="middle" font-family="Georgia, 'Times New Roman', serif" font-weight="700" font-size="78" class="navy">Data</text>
</svg>
